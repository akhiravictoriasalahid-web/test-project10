<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/0897c49575.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../styles/normalize.css">
    <link rel="stylesheet" href="../styles/index.css">
    <title>Contact Info</title>
</head>
<body>
    <header>

        <div class="container">
            
            <nav class="nav">
                <div class="logo">Genesis</div>

                <ul class="navlinks">
                    <li><a href="../pages/projects.html">Projects</a></li>
                    <li><a href="../pages/contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

     <section class="main">
        
        <div class="container main-layout">
            <div class="contact-page">
                <h1>Full set of great<br>features to make your<br>product fresh</h1>
                <p class="project-info">Our favorite brands are our friends! We help them to achieve their goals, they help us to stay sharp.</p> 

            </div>      

            <aside class="contact-form">
                <form action="#">

                    <div class="form-group">
                        <input type="text" id="name" placeholder="Name" required>
                    </div>

                    <div class="form-group">
                        <input type="text" id="Email" placeholder="Email" required>
                    </div>

                    <div class="form-group">
                        <textarea name="message" id="message" placeholder="Message" required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Submit</button>
                    
                </form>
            </aside>
        </div>
    </section>

    <section class="container contact-map">
        <img src="../images/Map.png" alt="google map">
    </section>

    <footer class="footer">
        <div class="container footer-row">
            
                <div class="logo">Genesis</div>
                <ul class="navlinks">
                    <li><a href="pages/projects.html">Projects</a></li>
                    <li><a href="pages/contact.html">Contact</a></li>
                </ul>

            <div class="footer-icon">
                <a href="#"><i class="fa-brands fa-dribbble"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>
    </footer>
</body>
</html>
